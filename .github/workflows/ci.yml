name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint, typecheck, and test
        run: npm run check

      - name: Verify generated Project instructions are up to date
        run: |
          npm run build:project
          if ! git diff --quiet -- project/project-instructions.md; then
            echo "::error::project/project-instructions.md is out of date. Run 'npm run build:project' and commit the result."
            git --no-pager diff -- project/project-instructions.md
            exit 1
          fi
